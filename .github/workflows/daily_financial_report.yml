name: Daily Financial Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

concurrency:
  group: financial-report-main
  cancel-in-progress: true

jobs:
  financial-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync latest main before generating data
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Run financial report pipeline
        env:
          PYTHONUNBUFFERED: "1"

          CORRO_SHOPIFY_STORE: ${{ secrets.CORRO_SHOPIFY_STORE }}
          CORRO_SHOPIFY_TOKEN: ${{ secrets.CORRO_SHOPIFY_TOKEN }}

          CAVALI_SHOPIFY_STORE: ${{ secrets.CAVALI_SHOPIFY_STORE }}
          CAVALI_SHOPIFY_TOKEN: ${{ secrets.CAVALI_SHOPIFY_TOKEN }}

          QB_CLIENT_ID: ${{ secrets.QB_CLIENT_ID }}
          QB_CLIENT_SECRET: ${{ secrets.QB_CLIENT_SECRET }}
          QB_REFRESH_TOKEN: ${{ secrets.QB_REFRESH_TOKEN }}
          QB_REALM_ID: ${{ secrets.QB_REALM_ID }}
          QB_ENVIRONMENT: sandbox

          MARKETING_SHEET_ID: ${{ secrets.MARKETING_SHEET_ID }}
          MARKETING_SHEET_START_YEAR: ${{ secrets.MARKETING_SHEET_START_YEAR }}

          WELLINGTON_LOCATION_ID: ${{ secrets.WELLINGTON_LOCATION_ID }}
          WELLINGTON_LOCATION_NAME: ${{ secrets.WELLINGTON_LOCATION_NAME }}

          START_YEAR: "2024"
        run: python -u main.py

      - name: Commit and push updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"

          git add docs/financial_report.json

          if git diff --cached --quiet; then
            echo "No dashboard data changes to commit."
            exit 0
          fi

          git commit -m "Update financial report data"

          # If main changed while this job was running, regenerate on top of latest main instead of rebasing a generated JSON file.
          if ! git push origin main; then
            echo "Push rejected because main changed. Regenerating financial_report.json on latest main..."
            git fetch origin main
            git reset --hard origin/main
            python -u main.py
            git add docs/financial_report.json
            if git diff --cached --quiet; then
              echo "No dashboard data changes after regenerating."
              exit 0
            fi
            git commit -m "Update financial report data"
            git push origin main
          fi
