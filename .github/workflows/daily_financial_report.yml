name: Daily Financial Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

concurrency:
  group: financial-report-main
  cancel-in-progress: true

jobs:
  financial-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run financial report pipeline
        env:
          PYTHONUNBUFFERED: "1"

          CORRO_SHOPIFY_STORE: ${{ secrets.CORRO_SHOPIFY_STORE }}
          CORRO_SHOPIFY_TOKEN: ${{ secrets.CORRO_SHOPIFY_TOKEN }}

          CAVALI_SHOPIFY_STORE: ${{ secrets.CAVALI_SHOPIFY_STORE }}
          CAVALI_SHOPIFY_TOKEN: ${{ secrets.CAVALI_SHOPIFY_TOKEN }}

          START_YEAR: "2024"
        run: python -u main.py

      - name: Commit and push updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"

          git status

          git add docs/financial_report.json

          if git diff --cached --quiet; then
            echo "No dashboard data changes to commit."
          else
            git commit -m "Update financial report data"
          fi

          git pull --rebase origin main
          git push origin main
